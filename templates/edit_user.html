<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit User – Persons Uploader</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <!-- Header -->
    <div class="mb-7 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-gray-800">Edit User</h1>
        <p class="text-sm text-gray-500 mt-0.5">
          <span class="font-medium text-indigo-600">{{ target_username }}</span>
        </p>
      </div>
      <a href="/admin" class="text-sm text-indigo-500 hover:text-indigo-700 transition">&larr; Users</a>
    </div>

    {% if error %}
    <div class="mb-5 rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 font-medium">
      {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="mb-5 rounded-xl bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700 font-medium">
      Changes saved successfully.
    </div>
    {% endif %}

    <form method="post" action="/admin/users/{{ target_username }}/edit" id="editForm" novalidate>
      <div class="space-y-5">

        <div>
          <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">
            New Password
            <span class="text-gray-400 font-normal">(leave blank to keep current)</span>
          </label>
          <input id="new_password" name="new_password" type="password"
                 placeholder="Min. 8 characters"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">
            Confirm Password
          </label>
          <input id="confirm_password" name="confirm_password" type="password"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
          <p id="matchError" class="hidden mt-1 text-xs text-red-600">Passwords do not match.</p>
        </div>

        <div class="flex items-center gap-3 rounded-lg bg-gray-50 border border-gray-200 px-4 py-3">
          <input id="can_upload" type="checkbox" name="can_upload" value="true"
                 {% if target_user.can_upload %}checked{% endif %}
                 class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
          <label for="can_upload" class="text-sm text-gray-700 cursor-pointer select-none">
            Can upload CSV files
          </label>
        </div>

      </div>

      <button type="submit"
              class="mt-7 w-full py-3 px-4 rounded-xl font-semibold text-white bg-indigo-600
                     hover:bg-indigo-700 active:scale-95 transition">
        Save Changes
      </button>
    </form>

  </div>

  <script>
    const form    = document.getElementById('editForm');
    const pwField = document.getElementById('new_password');
    const cfField = document.getElementById('confirm_password');
    const matchErr = document.getElementById('matchError');

    form.addEventListener('submit', (e) => {
      if (pwField.value && pwField.value !== cfField.value) {
        e.preventDefault();
        matchErr.classList.remove('hidden');
        cfField.focus();
      }
    });
    cfField.addEventListener('input', () => {
      matchErr.classList.toggle('hidden', !cfField.value || pwField.value === cfField.value);
    });
  </script>
</body>
</html>
