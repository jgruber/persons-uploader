<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Persons Uploader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <!-- Header -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-amber-100 mb-4">
        <svg class="w-7 h-7 text-amber-600" xmlns="http://www.w3.org/2000/svg" fill="none"
             viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 0 1 21.75 8.25Z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Admin</h1>
      <p class="text-sm text-gray-500 mt-1">
        Signed in as <span class="font-medium text-indigo-600">{{ username }}</span>
      </p>
    </div>

    {% if success %}
    <!-- Success state -->
    <div class="rounded-xl bg-green-50 border border-green-200 px-5 py-4 text-center mb-6">
      <p class="text-green-700 font-medium">Credentials updated successfully.</p>
      <p class="text-green-600 text-sm mt-1">
        Your browser will prompt for the new credentials on your next request.
      </p>
    </div>
    <a href="/"
       class="block w-full text-center py-3 px-4 rounded-xl font-semibold text-white bg-indigo-600
              hover:bg-indigo-700 active:scale-95 transition">
      Back to Home
    </a>

    {% else %}
    <!-- Error banner -->
    {% if error %}
    <div class="mb-5 rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700 font-medium">
      {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form method="post" action="/admin" id="adminForm" novalidate>

      <div class="space-y-5">

        <div>
          <label for="new_username" class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          <input id="new_username" name="new_username" type="text" required
                 value="{{ current_username }}"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
        </div>

        <div>
          <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">
            New Password
          </label>
          <input id="new_password" name="new_password" type="password" required
                 placeholder="Minimum 8 characters"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
        </div>

        <div>
          <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">
            Confirm Password
          </label>
          <input id="confirm_password" name="confirm_password" type="password" required
                 placeholder="Repeat new password"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent" />
          <p id="matchError" class="hidden mt-1 text-xs text-red-600">Passwords do not match.</p>
        </div>

      </div>

      <button type="submit"
              class="mt-7 w-full py-3 px-4 rounded-xl font-semibold text-white bg-amber-500
                     hover:bg-amber-600 active:scale-95 transition">
        Save Credentials
      </button>

    </form>

    <div class="mt-5 text-center">
      <a href="/" class="text-sm text-indigo-500 hover:text-indigo-700 transition">
        &larr; Back to Home
      </a>
    </div>
    {% endif %}

  </div>

  <script>
    const form    = document.getElementById('adminForm');
    const pwField = document.getElementById('new_password');
    const cfField = document.getElementById('confirm_password');
    const matchErr = document.getElementById('matchError');

    if (form) {
      form.addEventListener('submit', (e) => {
        if (pwField.value !== cfField.value) {
          e.preventDefault();
          matchErr.classList.remove('hidden');
          cfField.focus();
        }
      });

      cfField.addEventListener('input', () => {
        if (cfField.value && pwField.value !== cfField.value) {
          matchErr.classList.remove('hidden');
        } else {
          matchErr.classList.add('hidden');
        }
      });
    }
  </script>
</body>
</html>
